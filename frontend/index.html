git add .<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>监督打卡系统 - 用户端</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 400px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 40px 0; }
    .header h1 { color: #10b981; font-size: 24px; }
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .upload-area { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover, .upload-area.active { border-color: #10b981; background: #f0fdf4; }
    .upload-area i { font-size: 48px; color: #9ca3af; margin-bottom: 16px; }
    .upload-area p { color: #6b7280; font-size: 14px; }
    #preview { display: none; margin-top: 20px; }
    #preview img { width: 100%; border-radius: 8px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 16px; }
    .btn-primary { background: #10b981; color: white; }
    .btn-primary:hover { background: #059669; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .success { color: #10b981; text-align: center; padding: 16px; display: none; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; color: #374151; margin-bottom: 8px; }
    .form-group select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .user-id { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💧 打卡上传</h1>
    </div>
    
    <div class="card">
      <div class="form-group">
        <label>用户ID（用于识别）</label>
        <input type="text" class="user-id" id="userId" placeholder="请输入你的用户ID">
      </div>
      
      <div class="form-group">
        <label>打卡类型</label>
        <select id="checkinType">
          <option value="drink">喝水</option>
          <option value="exercise">运动</option>
          <option value="study">学习</option>
          <option value="other">其他</option>
        </select>
      </div>
      
      <div class="upload-area" id="uploadArea">
        <i>📷</i>
        <p>点击或拖拽上传图片</p>
      </div>
      
      <div id="preview">
        <img id="previewImg" src="">
      </div>
      
      <button class="btn btn-primary" id="submitBtn" disabled>确认打卡</button>
      
      <div class="success" id="successMsg">
        ✅ 打卡成功！
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">
  
  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const userId = document.getElementById('userId');
    const checkinType = document.getElementById('checkinType');
    
    let selectedFile = null;
    
    uploadArea.addEventListener('click', () => {
      fileInput.click();
    });
    
    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewImg.src = event.target.result;
          preview.style.display = 'block';
          submitBtn.disabled = false;
          successMsg.style.display = 'none';
        };
        reader.readAsDataURL(selectedFile);
      }
    });
    
    submitBtn.addEventListener('click', async () => {
      if (!selectedFile || !userId.value.trim()) {
        alert('请填写用户ID并选择图片');
        return;
      }
      
      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('userId', userId.value.trim());
      formData.append('type', checkinType.value);
      
      try {
        const response = await fetch('http://gowbtqmoein.sealosgzg.site:3000/api/checkin', {
          method: 'POST',
          body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
          successMsg.style.display = 'block';
          submitBtn.disabled = true;
          preview.style.display = 'none';
          selectedFile = null;
          fileInput.value = '';
        } else {
          alert('上传失败：' + result.error);
        }
      } catch (error) {
        alert('上传失败，请检查网络');
      }
    });
  </script>
</body>
</html>
